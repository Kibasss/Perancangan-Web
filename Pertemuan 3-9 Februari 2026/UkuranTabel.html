<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabel 5</title>
  </head>
  <body>
    <h4>Tabel dengan ukuran normal</h4>
    <table border="1">
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
    </table>
    <h4>Tabel dengan Width 75%</h4>
    <table border="1" width="75%">   
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
    </table>
    <h4>Tabel dengan Width 300px</h4>
    <table border="1" width="300px">   
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
  </body>
</html>
