<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Format Isi Sel</title>
  </head>
  <body>
    <h4>td tanpa Width</h4>
    <table border="1">
      <tr>
        <td>Manajemen</td>
        <td>Informatika</td>
      </tr>
    </table>
    <h4>td dengan Width dan Format Isi Sel</h4>
    <table border="1">
      <tr>
        <td width="170">Manajemen</td>
        <td width="170" align="center">Informatika</td>
      </tr>
    </table>
  </body>
</html>
