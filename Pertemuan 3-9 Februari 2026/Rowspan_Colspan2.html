<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rowspan dan Colspan</title>
  </head>
  <body>
    <table border="1">
      <tr>
        <td rowspan="2">Sektor</td>
        <td colspan="2">Tahun</td>
      </tr>
      <tr>
        <td>2022</td>
        <td>2023</td>
      </tr>
      <tr>
        <td>Pertanian</td>
        <td>70%</td>
        <td>80%</td>
      </tr>
    </table>
  </body>
</html>
