<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabel 4</title>
  </head>
  <body>
    <h4>Tanpa Cellpadding dan Cellspacing</h4>
    <table border="1">
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
    </table>
    <h4>Dengan Cellpadding = 8</h4>
    <table border="1" cellpadding="8">
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
    </table>
    <h4>Dengan Cellpadding = 8 dan Cellspacing = 15</h4>
    <table border="1" cellpadding="8" cellspacing="15">
      <tr>
        <th>NIM</th>
        <th>UTS</th>
        <th>UAS</th>
      </tr>
      <tr>
        <td>301</td>
        <td>85</td>
        <td>90</td>
      </tr>
    </table>
  </body>
</html>
