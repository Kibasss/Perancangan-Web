<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rowspan dan Colspan</title>
  </head>
  <body>
    <h4>Colspan pada baris kedua</h4>
    <table border="1">
      <tr>
        <td>Data Satu</td>
        <td>Data Dua</td>
      </tr>
      <tr>
        <td colspan="2">Data Tiga (Colspan 2)</td>
      </tr>
    </table>
    <h4>Rowspan pada kolom kedua</h4>
    <table border="1">
      <tr>
        <td>Data Empat</td>
        <td rowspan="2">Data Lima (Rowspan 2)</td>
      </tr>
      <tr>
        <td>Data Enam</td>
      </tr>
    </table>
  </body>
</html>
