<!doctype html>
<html>
  <head>
    <title>Perancangan Web</title>
    <style type="text/css">
      #main {
        width: 100%;
        margin: 0 auto;
        border: 1px solid red;
        padding: 1px;
      }
      #header {
        padding: 1px;
        margin: 1px;
        border: 1px solid black;
        text-align: center;
        height: 100px;
        background-color: #804040;
        color: white;
        font-size: 50px;
        background-image: url(Arif-Satria.jpg);
      }
      #menu-kiri {
        width: 15%;
        float: left;
        border: 1px solid green;
        margin-right: 2px;
      }
      #menu-kanan {
        width: 14%;
        float: right;
        border: 1px solid yellow;
        margin-left: 2px;
      }
      #menu-kiri div,
      #menu-kanan div {
        padding: 2px;
        margin: 2px;
        border: 1px solid blue;
        background-color: #ffc5a8;
      }
      #isi-tengah {
        width: 70%;
        float: left;
        border: 1px solid blue;
        background-color: #ffa980;
      }
      .bersih {
        float: 1px;
        clear: both;
      }
      #footer {
        padding: 1px;
        margin: 1px;
        border: 1px solid orange;
        text-align: center;
        background-color: #ffc5a8;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <div id="header">Perancangan Web</div>
      <div id="menu-kiri">
        <div><a href="">Beranda</a></div>

      <div id="isi-tengah">
        Saya Kuat </br>
        Saya Hebat </br>
        Saya Sukses </br>
        Saya Kaya </br>
        Saya Baik </br>
        Saya Ganteng </br>
        Saya Bahagia </br>
        Saya Ci I O </br>
        Saya Masuk Surga </br>
        Saya Aslinya 2 Orang </br>
        </div>
        <div id="menu-kanan">
            <div><a href="">Beranda</a></div>
            <div><a href="">Profil</a></div>
            <div><a href="">Akademik</a></div>
            <div><a href="">Galeri</a></div>
            <div><a href="">Hubungi Kami</a></div>
        </div>
        <div class="bersih"></div>
        <div id="footer">TPL62</div>
      </div>
    </div>
  </body>
</html>
