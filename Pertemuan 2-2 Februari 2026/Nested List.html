<!doctype html>
<html>
  <head>
    <title>Nested List</title>
  </head>
  <body>
    <ul>
      <li>Coffee</li>
      <ul>
        <li>Black Coffee</li>
        <li>White Coffee</li>
      </ul>
      <li>Tea</li>
      <ul>
        <li>Black Tea</li>
        <li>Milk Tea</li>
      </ul>
      <li>Juice</li>
      <ul>
        <li>Orange Juice</li>
        <li>Apple Juice</li>
      </ul>
    </ul>
  </body>
</html>
