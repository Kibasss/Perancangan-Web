<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keliling Lingkaran</title>
  </head>
  <body>
    <script lang="JavaScript">
      var R = 10;
      var n = 3;

      var Keliling = 2 * Math.PI * R;
      var Keliling2 = n * Keliling;
      document.write("3 x Keliling Lingkaran = " + Keliling2 + "<br>");
    </script>
  </body>
</html>
